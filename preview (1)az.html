<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    margin: 20px;
}
h1 {
    text-align: center;
}
.controls {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}
textarea {
    width: 100%;
    height: 100px;
    margin-bottom: 10px;
    padding: 10px;
    font-size: 16px;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
.page {
    width: 210mm;
    height: 297mm;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    page-break-after: always;
}
.letter {
    font-size: 200px;
}
label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>
<body>
<h1>Mətn → A4 PDF Hərflər Generatoru</h1>
<div class="controls">
<label>Mətni daxil edin:</label>
<textarea id="textInput" placeholder="Məsələn: Salam Dünya"></textarea>

<label>Rəng: <input type="color" id="color" value="#000000" /></label>

<label>Şrift:
<select id="font">
<option value="Arial">Arial</option>
<option value="Times New Roman">Times New Roman</option>
<option value="Verdana">Verdana</option>
<option value="Courier New">Courier New</option>
</select>
</label>

<label>Şrift ölçüsü:
<input type="range" id="size" min="100" max="300" value="200" />
</label>

<label><input type="checkbox" id="bold" /> Qalın</label>

<br />
<button onclick="generate()">Səhifələri Yarat</button>
<button onclick="downloadPDF()">PDF-i Yüklə</button>
<button onclick="downloadHTML()">Tam HTML Yüklə</button>
</div>
<div id="pages"></div>

<script>
function generate() {
  const text = document.getElementById("textInput").value;
  const pages = document.getElementById("pages");
  pages.innerHTML = "";

  const color = document.getElementById("color").value;
  const font = document.getElementById("font").value;
  const size = document.getElementById("size").value;
  const bold = document.getElementById("bold").checked;

  for (let char of text) {
    if (char.trim() === "") continue;

    const page = document.createElement("div");
    page.className = "page";

    const letter = document.createElement("div");
    letter.className = "letter";
    letter.innerText = char;

    letter.style.color = color;
    letter.style.fontFamily = font;
    letter.style.fontWeight = bold ? "bold" : "normal";
    letter.style.fontSize = size + "px";

    page.appendChild(letter);
    pages.appendChild(page);
  }
}

function downloadPDF() {
  const element = document.getElementById("pages");

  html2pdf()
    .set({
      margin: 0,
      filename: "herfler.pdf",
      html2canvas: { scale: 2 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
    })
    .from(element)
    .save();
}
