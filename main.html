<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age 5: Logic Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .grid-bg {
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #1e293b;
            border-radius: 20px;
            margin-top: 4px;
            border: 2px solid #334155;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .emoji-big {
            font-size: 2.2rem;
            line-height: 1.2;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        #game-wrapper {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
    </style>
</head>
<body class="grid-bg">

    <div id="game-wrapper">
        
        <!-- Header / Scores -->
        <div class="flex justify-between items-center bg-slate-800/80 p-4 rounded-2xl border-4 border-slate-700 mb-3 shadow-2xl backdrop-blur-md">
            <div id="p1-stats" class="w-1/3 text-center">
                <p class="text-blue-400 font-black uppercase tracking-widest text-[10px] mb-0">Student 1</p>
                <p id="p1-score" class="text-4xl font-black">0</p>
                <div class="progress-container"><div id="p1-progress" class="progress-bar bg-blue-500" style="width: 0%"></div></div>
                <p id="p1-count" class="text-[9px] text-slate-500 mt-1 font-bold uppercase tracking-widest">0/10</p>
            </div>
            
            <div class="w-1/4 text-center px-2">
                <div class="bg-slate-950 py-2 rounded-xl border border-yellow-500/30">
                    <p id="level-display" class="text-[9px] text-yellow-400 font-black uppercase tracking-[0.2em]">UPDATED</p>
                    <p id="level-name" class="text-[10px] text-white font-bold leading-none mt-1">Logic!</p>
                </div>
            </div>

            <div id="p2-stats" class="w-1/3 text-center">
                <p class="text-pink-400 font-black uppercase tracking-widest text-[10px] mb-0">Student 2</p>
                <p id="p2-score" class="text-4xl font-black">0</p>
                <div class="progress-container"><div id="p2-progress" class="progress-bar bg-pink-500" style="width: 0%"></div></div>
                <p id="p2-count" class="text-[9px] text-slate-500 mt-1 font-bold uppercase tracking-widest">0/10</p>
            </div>
        </div>

        <!-- The Board -->
        <div id="board" class="flex-grow bg-slate-900/90 rounded-[2rem] border-4 border-slate-700 shadow-2xl relative flex flex-col items-center justify-center overflow-hidden p-4">
            
            <div id="turn-banner" class="absolute top-4 px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] transition-all duration-300">
                PLAYER 1'S TURN
            </div>

            <!-- Question Display -->
            <div id="question-box" class="text-center mb-6 w-full max-w-xl">
                <div id="question-text" class="text-xl md:text-2xl font-bold tracking-tight leading-tight">
                    <!-- Questions injected here -->
                </div>
            </div>

            <!-- Options Grid -->
            <div id="options-grid" class="grid grid-cols-2 gap-4 w-full max-w-sm">
                <!-- Buttons generated by JS -->
            </div>

            <!-- Win Overlay -->
            <div id="win-screen" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 hidden p-6 text-center">
                <div class="text-[6rem] mb-2">🏅</div>
                <h1 id="winner-text" class="text-4xl font-black mb-2 uppercase">SMARTY!</h1>
                <div id="final-stats" class="bg-slate-900 border-2 border-slate-800 p-4 rounded-2xl mb-4 w-full max-w-[200px]">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-400 font-black text-xl">P1:</span>
                        <span id="final-p1" class="font-black text-3xl">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-pink-400 font-black text-xl">P2:</span>
                        <span id="final-p2" class="font-black text-3xl">0</span>
                    </div>
                </div>
                <button onclick="resetGame()" class="bg-yellow-400 text-black px-10 py-4 rounded-2xl font-black text-xl hover:scale-105 transition-all shadow-lg">PLAY AGAIN</button>
            </div>
        </div>

        <div class="mt-2 flex justify-between items-center text-slate-500 text-[10px] font-black uppercase tracking-widest">
            <span>Age 5 Challenge</span>
            <span>Numbers 1-10</span>
        </div>
    </div>

    <script>
        const levels = [
            { name: "Hidden Numbers", type: "count_tricky" },
            { name: "Pattern Mix", type: "pattern_advanced" },
            { name: "Logic Stories", type: "logic_situations" },
            { name: "Comparing Values", type: "logic_math_compare" },
            { name: "Mystery Math", type: "mystery_addition" }
        ];

        let state = {
            currentPlayer: 1,
            p1Score: 0,
            p2Score: 0,
            p1Count: 0,
            p2Count: 0,
            maxQuestions: 10,
            currentQuestion: null,
            isProcessing: false
        };

        const questionEl = document.getElementById('question-text');
        const optionsEl = document.getElementById('options-grid');
        const turnBanner = document.getElementById('turn-banner');
        const levelDisplay = document.getElementById('level-display');
        const levelNameEl = document.getElementById('level-name');
        const p1ScoreEl = document.getElementById('p1-score');
        const p2ScoreEl = document.getElementById('p2-score');

        function generateQuestion() {
            const count = state.currentPlayer === 1 ? state.p1Count : state.p2Count;
            const levelIndex = Math.min(Math.floor(count / 2), levels.length - 1);
            const level = levels[levelIndex];
            
            let q, a, options = [];

            switch(level.type) {
                case "count_tricky":
                    const set = ["🐝", "🐞", "🦋", "🍄"];
                    const bug = set[Math.floor(Math.random() * set.length)];
                    const countVal = Math.floor(Math.random() * 5) + 6; // 6 to 10
                    q = `<div class="mb-1 text-base text-slate-400 uppercase">How many total?</div><div class="emoji-big tracking-tighter leading-tight">${bug.repeat(Math.ceil(countVal/2))}<br>${bug.repeat(Math.floor(countVal/2))}</div>`;
                    a = countVal;
                    break;
                
                case "pattern_advanced":
                    // AABBAA patterns
                    const emojis = ["🚗", "🚲", "🛴"];
                    const e1 = emojis[0];
                    const e2 = emojis[1];
                    q = `<div class="mb-1 text-base text-slate-400 uppercase">What fills the gap?</div><div class="emoji-big tracking-widest">${e1}${e1}${e2}${e2}${e1}?</div>`;
                    a = e1;
                    options = [e1, e2, emojis[2]];
                    break;

                case "logic_situations":
                    const stories = [
                        {t: "A frog has 4 legs. If he sits on a chair, how many legs are on the floor?", a: 4},
                        {t: "You have 3 apples. You give 1 to a friend. How many do YOU have?", a: 2},
                        {t: "Birds have 2 wings. How many wings do 3 birds have?", a: 6},
                        {t: "A car has 4 wheels. A bike has 2. Which has MORE?", a: "Car"},
                        {t: "If you have 8 candy bars and eat NONE, how many are left?", a: 8}
                    ];
                    let s = stories[Math.floor(Math.random() * stories.length)];
                    q = `<div class="text-xl px-4">${s.t}</div>`;
                    a = s.a;
                    if(typeof a === "string") options = ["Car", "Bike"];
                    break;

                case "logic_math_compare":
                    let val1 = Math.floor(Math.random() * 5) + 5;
                    let val2 = Math.floor(Math.random() * 4) + 1;
                    q = `<div class="text-lg mb-2">Which group is BIGGER?</div>
                         <div class="flex justify-center gap-8 items-center">
                            <div class="bg-blue-900/30 p-2 rounded-xl">Group A: <span class="text-2xl">${val1}</span></div>
                            <span class="font-bold">OR</span>
                            <div class="bg-pink-900/30 p-2 rounded-xl">Group B: <span class="text-2xl">${val2}</span></div>
                         </div>`;
                    a = "Group A";
                    options = ["Group A", "Group B"];
                    break;

                case "mystery_addition":
                    let base = Math.floor(Math.random() * 4) + 1;
                    let target = base + Math.floor(Math.random() * 3) + 1;
                    q = `<div class="text-3xl font-black">${base} + ❓ = ${target}</div>
                         <div class="text-sm mt-2 uppercase text-slate-400">What is the missing number?</div>`;
                    a = target - base;
                    break;
            }

            if (options.length === 0) {
                options.push(a);
                while (options.length < 4) {
                    let wrong = Math.floor(Math.random() * 11);
                    if (!options.includes(wrong)) options.push(wrong);
                }
            }
            options.sort(() => Math.random() - 0.5);

            return { q, a, options, levelName: level.name, levelIdx: levelIndex + 1 };
        }

        function updateUI() {
            const qObj = generateQuestion();
            state.currentQuestion = qObj;

            questionEl.innerHTML = qObj.q;
            levelDisplay.innerText = `LEVEL ${qObj.levelIdx}`;
            levelNameEl.innerText = qObj.levelName;
            optionsEl.innerHTML = '';
            
            qObj.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-slate-800 border-b-4 border-slate-950 py-6 rounded-2xl text-xl font-black hover:bg-slate-700 hover:scale-105 transition-all active:translate-y-1 shadow-xl px-2 overflow-hidden text-ellipsis";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, btn);
                optionsEl.appendChild(btn);
            });

            if (state.currentPlayer === 1) {
                turnBanner.innerText = "PLAYER 1'S TURN";
                turnBanner.className = "absolute top-4 px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] bg-blue-600 text-white shadow-xl";
            } else {
                turnBanner.innerText = "PLAYER 2'S TURN";
                turnBanner.className = "absolute top-4 px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] bg-pink-600 text-white shadow-xl";
            }

            document.getElementById('p1-count').innerText = `${state.p1Count}/10`;
            document.getElementById('p2-count').innerText = `${state.p2Count}/10`;
            document.getElementById('p1-progress').style.width = `${(state.p1Count / state.maxQuestions) * 100}%`;
            document.getElementById('p2-progress').style.width = `${(state.p2Count / state.maxQuestions) * 100}%`;
        }

        function handleAnswer(choice, btn) {
            if (state.isProcessing) return;
            state.isProcessing = true;

            const isCorrect = (choice == state.currentQuestion.a);

            if (isCorrect) {
                btn.classList.replace('bg-slate-800', 'bg-green-500');
                if (state.currentPlayer === 1) state.p1Score++;
                else state.p2Score++;
            } else {
                btn.classList.replace('bg-slate-800', 'bg-red-500');
                btn.classList.add('shake');
            }

            if (state.currentPlayer === 1) state.p1Count++;
            else state.p2Count++;

            p1ScoreEl.innerText = state.p1Score;
            p2ScoreEl.innerText = state.p2Score;

            setTimeout(() => {
                if (state.p1Count >= state.maxQuestions && state.p2Count >= state.maxQuestions) {
                    showEndScreen();
                } else {
                    if (state.currentPlayer === 1 && state.p2Count < state.maxQuestions) {
                        state.currentPlayer = 2;
                    } else if (state.currentPlayer === 2 && state.p1Count < state.maxQuestions) {
                        state.currentPlayer = 1;
                    }
                    state.isProcessing = false;
                    updateUI();
                }
            }, 600);
        }

        function showEndScreen() {
            let resultText = "";
            if (state.p1Score > state.p2Score) {
                resultText = "P1 IS THE MASTER!";
                document.getElementById('winner-text').className = "text-4xl font-black mb-2 text-blue-400 text-center";
            } else if (state.p2Score > state.p1Score) {
                resultText = "P2 IS THE MASTER!";
                document.getElementById('winner-text').className = "text-4xl font-black mb-2 text-pink-400 text-center";
            } else {
                resultText = "BRAIN TIE!";
                document.getElementById('winner-text').className = "text-4xl font-black mb-2 text-yellow-400 text-center";
            }
            
            document.getElementById('winner-text').innerText = resultText;
            document.getElementById('final-p1').innerText = state.p1Score;
            document.getElementById('final-p2').innerText = state.p2Score;
            document.getElementById('win-screen').classList.remove('hidden');
        }

        function resetGame() {
            state = {
                currentPlayer: 1,
                p1Score: 0, p2Score: 0,
                p1Count: 0, p2Count: 0,
                maxQuestions: 10,
                currentQuestion: null,
                isProcessing: false
            };
            p1ScoreEl.innerText = "0";
            p2ScoreEl.innerText = "0";
            document.getElementById('win-screen').classList.add('hidden');
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
